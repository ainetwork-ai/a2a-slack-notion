<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slack-Notion Clipper</title>
    <style>
      :root {
        color-scheme: light dark;
        --fg: #1f1f1f;
        --muted: #6b7280;
        --accent: #6d28d9;
        --accent-hover: #5b21b6;
        --ok: #047857;
        --err: #b91c1c;
        --bg: #ffffff;
        --chip: rgba(109, 40, 217, 0.08);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #f5f5f5;
          --muted: #9ca3af;
          --bg: #1f2023;
          --chip: rgba(167, 139, 250, 0.16);
        }
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        font-size: 13px;
        color: var(--fg);
        background: var(--bg);
        width: 320px;
        padding: 16px;
      }
      h1 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 12px;
      }
      p.lead {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 12px;
        line-height: 1.5;
      }
      button {
        width: 100%;
        padding: 8px 12px;
        border: 0;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.15s,
          opacity 0.15s;
      }
      button[disabled] {
        opacity: 0.5;
        cursor: progress;
      }
      .primary {
        background: var(--accent);
        color: #fff;
      }
      .primary:hover:not([disabled]) {
        background: var(--accent-hover);
      }
      .linkrow {
        display: flex;
        justify-content: flex-end;
        margin-top: 10px;
      }
      .linkrow a {
        color: var(--muted);
        font-size: 11px;
        text-decoration: none;
      }
      .linkrow a:hover {
        text-decoration: underline;
      }
      .status {
        margin-top: 12px;
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 12px;
        min-height: 1.2em;
        background: var(--chip);
      }
      .status--idle {
        background: transparent;
        padding: 0;
      }
      .status--loading {
        color: var(--muted);
      }
      .status--success {
        color: var(--ok);
      }
      .status--error {
        color: var(--err);
      }
      .status a {
        color: inherit;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <h1>Clip to Notion</h1>
    <p class="lead">
      Sends the current page's title, URL, and selected text to your
      slack-a2a Notion workspace.
    </p>
    <button id="clip" class="primary" type="button">Clip this page</button>
    <div id="status" class="status status--idle"></div>
    <div class="linkrow">
      <a id="open-options" href="#">Settings</a>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
