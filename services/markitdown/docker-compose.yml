services:
  markitdown:
    build: .
    container_name: markitdown-api
    ports:
      - "8300:8300"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8300/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
